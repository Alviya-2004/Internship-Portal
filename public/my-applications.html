<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Applications | Unified Internship Navigator</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
</head>
<body class="bg-gray-50 font-sans">
<header class="bg-red-700 text-white shadow">
  <div class="max-w-6xl mx-auto flex items-center justify-between py-3 px-4">
    <span class="font-semibold text-sm">Unified Internship Navigator – Student</span>
    <span class="text-xs text-red-100 flex items-center space-x-2">
      <button onclick="goHome()" class="hover:underline">Home</button>
      <span>|</span>
      <button onclick="goInternships()" class="hover:underline">Internships</button>
      <span>|</span>
      <span class="underline">My Applications</span>
      <span>|</span>
      <button onclick="goProfile()" class="hover:underline">Profile</button>
      <button
        onclick="logout()"
        class="ml-3 bg-white text-red-700 px-2 py-0.5 rounded text-[11px] hover:bg-red-50">
        Logout
      </button>
    </span>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-6 text-xs">
  <h1 class="text-lg font-semibold text-gray-800 mb-3">My Applications</h1>
  <div id="myAppsList" class="space-y-3"></div>
</main>

<script>
  function goHome() { window.location.href = '/student.html'; }
  function goInternships() { window.location.href = '/student.html'; }
  function goProfile() { window.location.href = '/profile.html'; }
  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('role');
    window.location.href = '/login.html';
  }

  async function loadMyApplications() {
    const token = localStorage.getItem('token');
    if (!token) {
      alert('Please login first.');
      window.location.href = '/login.html';
      return;
    }

    const res = await fetch('/api/my-applications', {
      headers: { 'x-auth-token': token },
    });

    const list = document.getElementById('myAppsList');

    if (!res.ok) {
      list.innerHTML = '<p class="text-red-600 text-[11px]">Error loading applications.</p>';
      return;
    }

    const data = await res.json();
    if (!data.length) {
      list.innerHTML = '<p class="text-gray-500 text-[11px]">No applications yet.</p>';
      return;
    }

    list.innerHTML = '';
    data.forEach(app => {
      const card = document.createElement('div');
      card.className =
        'border border-gray-200 rounded-lg p-3 bg-white flex justify-between items-center';

      const appliedAt = app.applied_at
        ? new Date(app.applied_at).toLocaleString()
        : '';
        
      const intTitle = app.internship_id ? app.internship_id.title : 'Internship';
      
      let compName = '';
      if (app.internship_id && app.internship_id.company_id && app.internship_id.company_id.name) {
        compName = app.internship_id.company_id.name;
      }
      
      card.innerHTML = `
        <div class="space-y-1">
          <div class="text-sm font-semibold text-gray-900">
            ${intTitle}
          </div>
          <div class="text-[11px] text-red-700 font-medium ${compName ? '' : 'hidden'}">
            ${compName}
          </div>
          <div class="text-[11px] text-gray-600">
            Dept: ${app.department || '-'} · CGPA: ${app.cgpa || '-'}
          </div>
          <div class="text-[11px] text-gray-500">
            Applied at: ${appliedAt}
          </div>
        </div>
        <div class="text-right">
          <div class="text-[11px] font-semibold ${
            app.status === 'Selected'
              ? 'text-green-700'
              : app.status === 'Rejected'
              ? 'text-red-700'
              : app.status === 'Shortlisted'
              ? 'text-yellow-700'
              : 'text-gray-700'
          }">
            Admin: ${app.status}
          </div>
          <div class="text-[10px] mt-1 font-medium ${
            app.facultyApprovalStatus === 'Approved'
              ? 'text-green-600'
              : app.facultyApprovalStatus === 'Rejected'
              ? 'text-red-600'
              : 'text-gray-500'
          }">
            Faculty: ${app.facultyApprovalStatus || 'Pending'}
          </div>
        </div>
      `;

      list.appendChild(card);
    });
  }

  loadMyApplications();
</script>
</body>
</html>
