<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Faculty | Unified Internship Navigator</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
</head>
<body class="bg-gray-50 font-sans">
  <header class="bg-red-700 text-white shadow">
    <div class="max-w-6xl mx-auto flex items-center justify-between py-3 px-4">
      <span class="font-semibold text-sm">Unified Internship Navigator – Faculty</span>
      <span class="text-xs text-red-100 flex items-center space-x-2">
        <button onclick="goHome()" class="hover:underline">Home</button>
        <span>|</span>
        <button onclick="goStudents()" class="hover:underline">My Students</button>
        <span>|</span>
        <button onclick="goApplications()" class="hover:underline">Applications</button>
        <span>|</span>

        <!-- PROFILE DROPDOWN -->
        <div class="relative flex items-center justify-center pl-2">
          <button id="profileBtn" class="focus:outline-none flex items-center space-x-1 hover:opacity-80 transition">
            <div id="profileAvatar" class="w-7 h-7 rounded-full bg-white text-red-700 font-bold flex items-center justify-center text-xs border border-red-200 shadow-sm">
              F
            </div>
          </button>
          
          <div id="profileDropdown" class="hidden absolute top-full right-0 mt-3 w-56 bg-white rounded-lg shadow-xl border border-gray-100 z-50 text-gray-800 flex flex-col overflow-hidden text-left">
            <div class="px-4 py-3 border-b border-gray-50 bg-gray-50">
              <div id="profileDropdownName" class="font-bold text-sm text-gray-900 truncate">Loading...</div>
              <div id="profileDropdownEmail" class="text-[11px] text-gray-500 truncate mt-0.5"></div>
              <div id="profileDropdownDept" class="text-[10px] text-red-600 font-semibold mt-1 inline-block bg-red-50 px-2 py-0.5 rounded-full empty:hidden"></div>
            </div>
            <div class="flex flex-col py-1">
              <button onclick="openChangePasswordModal()" class="text-left px-4 py-2 text-xs font-medium text-gray-700 hover:bg-gray-50 hover:text-red-700 transition">Change Password</button>
            </div>
            <div class="border-t border-gray-100">
              <button onclick="logout()" class="w-full text-left px-4 py-2.5 text-xs font-bold text-red-700 hover:bg-red-50 transition">
                Logout
              </button>
            </div>
          </div>
        </div>
      </span>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <!-- Add Student Section -->
    <section id="addStudentSection" class="mb-6 bg-white border border-gray-100 rounded-lg shadow-sm">
      <div class="border-b px-4 py-2.5 bg-gray-50 flex items-center justify-between">
        <div>
          <h2 class="text-sm font-semibold text-gray-800">Add Student to My Class</h2>
          <p class="text-[11px] text-gray-500">Create login credentials and default profile for a student.</p>
        </div>
      </div>
      <form id="createStudentForm" class="px-4 py-3 grid grid-cols-1 md:grid-cols-4 gap-3 text-xs">
        <div>
          <label class="block text-gray-600 mb-1">Name*</label>
          <input name="name" required class="w-full border rounded px-2 py-1" placeholder="Student Name">
        </div>
        <div>
          <label class="block text-gray-600 mb-1">Email*</label>
          <input type="email" name="email" required class="w-full border rounded px-2 py-1" placeholder="student2027@it.ajce.in">
        </div>
        <div>
          <label class="block text-gray-600 mb-1">Admission No.*</label>
          <input name="admission_no" required class="w-full border rounded px-2 py-1" placeholder="e.g. 2023IT005">
        </div>
        <div class="grid grid-cols-2 gap-2">
           <div>
             <label class="block text-gray-600 mb-1">Pass*</label>
             <input name="password" required class="w-full border rounded px-2 py-1" value="student123">
           </div>
           <div>
             <label class="block text-gray-600 mb-1">&nbsp;</label>
             <button type="submit" class="w-full bg-red-700 hover:bg-red-800 text-white font-semibold py-1 rounded">Add</button>
           </div>
        </div>
      </form>
      <p id="studentMessage" class="px-4 pb-2 text-[11px] hidden"></p>
    </section>

    <!-- My Students Section -->
    <section id="myStudentsSection" class="mb-6">
      <h2 class="text-lg font-semibold text-gray-800 mb-3">My Students</h2>
      <div id="studentsContainer" class="bg-white border border-gray-100 rounded-lg p-3 text-xs space-y-2">
        Loading students...
      </div>
    </section>

    <!-- Applications Section -->
    <section id="myApplicationsSection">
      <h2 class="text-lg font-semibold text-gray-800 mb-3">Applications from My Students</h2>
      <div id="appsContainer" class="bg-white border border-gray-100 rounded-lg p-3 text-xs space-y-2">
        Loading applications...
      </div>
    </section>
    <!-- Edit Student Modal -->
    <div id="editStudentModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
      <div class="bg-white rounded-lg p-5 w-full max-w-md shadow-xl border border-gray-100 max-h-[90vh] overflow-y-auto">
        <h2 class="text-sm font-semibold text-gray-800 mb-3 border-b pb-2">Edit Student</h2>
        <form id="editStudentForm" class="space-y-3 text-xs">
          <input type="hidden" name="id" id="editStudentId">
          <div>
            <label class="block text-gray-600 mb-1">Name</label>
            <input class="w-full border rounded px-2 py-1" name="name" id="editStudentName" required>
          </div>
          <div>
            <label class="block text-gray-600 mb-1">Email</label>
            <input type="email" class="w-full border rounded px-2 py-1" name="email" id="editStudentEmail" required>
          </div>
          <div>
            <label class="block text-gray-600 mb-1">Admission No.</label>
            <input class="w-full border rounded px-2 py-1" name="admission_no" id="editStudentAdmNo">
          </div>
          <div>
            <label class="block text-gray-600 mb-1">Password (Leave blank to keep unchanged)</label>
            <input class="w-full border rounded px-2 py-1" name="password" id="editStudentPassword">
          </div>
          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="block text-gray-600 mb-1">Batch</label>
              <input class="w-full border rounded px-2 py-1" name="batch" id="editStudentBatch">
            </div>
            <div>
              <label class="block text-gray-600 mb-1">Semester</label>
              <input type="number" class="w-full border rounded px-2 py-1" name="sem" id="editStudentSem">
            </div>
          </div>
          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="block text-gray-600 mb-1">Branch</label>
              <input class="w-full border rounded px-2 py-1" name="branch" id="editStudentBranch">
            </div>
            <div>
              <label class="block text-gray-600 mb-1">Phone</label>
              <input class="w-full border rounded px-2 py-1" name="phn" id="editStudentPhone">
            </div>
          </div>
          <div class="flex justify-end space-x-2 mt-4 text-xs font-semibold">
            <button type="button" class="px-3 py-1.5 bg-gray-200 text-gray-700 rounded hover:bg-gray-300" onclick="closeEditStudentModal()">Cancel</button>
            <button type="submit" class="px-3 py-1.5 bg-red-700 text-white rounded hover:bg-red-800">Save Student</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script>
    function goHome() {
      const role = localStorage.getItem('role');
      if (role === 'dept_admin' || role === 'main_admin') {
        window.location.href = '/admin.html';
      } else {
        window.location.href = '/faculty.html';
      }
    }
    function goStudents() {
      document.getElementById('myStudentsSection').scrollIntoView({ behavior: 'smooth' });
    }
    function goApplications() {
      document.getElementById('myApplicationsSection').scrollIntoView({ behavior: 'smooth' });
    }
    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('role');
      window.location.href = '/login.html';
    }
  </script>
  <script src="faculty.js"></script>
  <script src="changePassword.js"></script>
</body>
</html>
