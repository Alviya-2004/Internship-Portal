<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Login | Unified Internship Navigator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
</head>

<body class="font-sans relative min-h-screen bg-gray-900">
  <!-- Background Image -->
  <img src="/college-bg.jpg" alt="College Background" class="fixed inset-0 w-full h-full object-cover z-0">
  <div class="fixed inset-0 bg-black bg-opacity-50 z-0"></div>

  <div class="relative z-10 flex flex-col min-h-screen">
    <!-- Centered login card -->
    <main class="flex-grow flex items-center justify-center px-4 py-8">
      <div class="w-full max-w-md bg-white rounded-xl p-6 shadow-2xl space-y-4">
        <div class="text-center space-y-1">
          <div class="text-sm font-semibold text-gray-900">
            Unified Internship Navigator
          </div>
          <div class="text-[11px] text-gray-500">
            Sign in with your college account to continue
          </div>
        </div>

        <form id="loginForm" class="space-y-3">
          <div>
            <label class="block text-[11px] text-gray-600 mb-1">College Email</label>
            <input id="email" type="email"
              class="w-full border border-gray-200 rounded px-3 py-1.5 text-[12px] focus:outline-none focus:ring-1 focus:ring-red-600"
              placeholder="name2027@it.ajce.in" required />
          </div>

          <div>
            <label class="block text-[11px] text-gray-600 mb-1">Password</label>
            <input id="password" type="password"
              class="w-full border border-gray-200 rounded px-3 py-1.5 text-[12px] focus:outline-none focus:ring-1 focus:ring-red-600"
              placeholder="••••••••" required />
          </div>

          <button type="submit"
            class="w-full bg-red-700 hover:bg-red-800 text-white text-[12px] font-medium py-1.5 rounded">
            Sign in
          </button>
        </form>

        <div class="text-[11px] text-center mt-2">
          <button id="forgotPasswordBtn" class="text-red-700 hover:underline">Forgot your password?</button>
        </div>

        <p id="loginMessage" class="text-[11px] text-center text-red-600"></p>
      </div>
    </main>

    <!-- Forgot Password Modal Step 1 -->
    <div id="fpModal1" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
      <div class="bg-white rounded-lg p-5 w-80 shadow-lg">
        <h2 class="text-sm font-semibold mb-3">Reset Password</h2>
        <p class="text-[11px] text-gray-500 mb-3">Enter your college email address to receive an OTP.</p>
        <form id="fpForm1" class="space-y-3">
          <div>
            <label class="block text-[11px] text-gray-600 mb-1">Email</label>
            <input type="email" id="fpEmail"
              class="w-full border border-gray-200 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-red-600 focus:outline-none"
              required>
          </div>
          <p id="fpMessage1" class="text-[11px] hidden"></p>
          <div class="flex justify-end space-x-2 mt-4">
            <button type="button" onclick="closeFpModal1()"
              class="px-3 py-1.5 text-xs text-gray-600 bg-gray-100 hover:bg-gray-200 rounded">Cancel</button>
            <button type="submit" class="px-3 py-1.5 text-xs text-white bg-red-700 hover:bg-red-800 rounded">Send
              OTP</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Forgot Password Modal Step 2 -->
    <div id="fpModal2" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
      <div class="bg-white rounded-lg p-5 w-80 shadow-lg">
        <h2 class="text-sm font-semibold mb-3">Verify OTP & Reset</h2>
        <form id="fpForm2" class="space-y-3">
          <div>
            <label class="block text-[11px] text-gray-600 mb-1">Enter OTP</label>
            <input type="text" id="fpOtp"
              class="w-full border border-gray-200 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-red-600 focus:outline-none"
              required>
          </div>
          <div>
            <label class="block text-[11px] text-gray-600 mb-1">New Password</label>
            <input type="password" id="fpNewPass"
              class="w-full border border-gray-200 rounded px-2 py-1.5 text-xs focus:ring-1 focus:ring-red-600 focus:outline-none"
              required>
          </div>
          <p id="fpMessage2" class="text-[11px] hidden"></p>
          <div class="flex justify-end space-x-2 mt-4">
            <button type="button" onclick="closeFpModal2()"
              class="px-3 py-1.5 text-xs text-gray-600 bg-gray-100 hover:bg-gray-200 rounded">Cancel</button>
            <button type="submit" class="px-3 py-1.5 text-xs text-white bg-red-700 hover:bg-red-800 rounded">Reset
              Password</button>
          </div>
        </form>
      </div>
    </div>

    <script src="login.js"></script>
  </div>
</body>

</html>
